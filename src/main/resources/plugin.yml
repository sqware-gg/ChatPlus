name: ChatPlus
version: 0.1.0
main: dev.chatplus.ChatPlusPlugin
api-version: '1.18'
author: SQWARE / Conflict
website: https://sqware.gg
description: Player chat focus modes and categorized notifications for Paper servers.
commands:
  chat:
    description: Manage your ChatPlus focus mode and category preferences.
    usage: /chat
    aliases:
      - chatplus
      - focus
  chatadmin:
    description: Manage ChatPlus.
    usage: /chatadmin
    aliases:
      - cpa
      - chatplusadmin
  chatplusview:
    description: Opens a shared ChatPlus inventory snapshot.
    usage: /chatplusview <id>
permissions:
  chatplus.command:
    description: Allows players to manage their chat preferences.
    default: true
  chatplus.admin:
    description: Allows administrative ChatPlus commands.
    default: op
    children:
      chatplus.notify: true
  chatplus.bypass:
    description: Allows a sender's regular chat to bypass recipient filters.
    default: op
  chatplus.notify:
    description: Allows sending categorized ChatPlus notifications.
    default: op
  chatplus.item:
    description: Allows sharing the main hand item in chat with [item].
    default: true
  chatplus.item.offhand:
    description: Allows sharing the off hand item in chat with [offhand].
    default: true
  chatplus.item.bypass-cooldown:
    description: Bypasses ChatPlus item share cooldowns.
    default: op
  chatplus.inventory:
    description: Allows sharing inventory snapshots in chat with [inventory].
    default: true
  chatplus.enderchest:
    description: Allows sharing ender chest snapshots in chat with [enderchest].
    default: true
