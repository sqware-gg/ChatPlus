# ChatPlus
# Used for update checks.
# Do not change unless you know what you are doing.
config-version: 9

defaults:
  # Initial mode for players without saved preferences.
  mode: "normal"

  # Players still see their own chat messages even if their mode hides regular chat.
  always-show-own-chat: true

  # Players with chatplus.bypass are visible to everyone.
  sender-bypass-permission: true

mentions:
  enabled: true
  # Matches @PlayerName in regular chat.
  prefix: "@"
  case-sensitive: false
  # Also treat the bare player name as a mention.
  match-without-prefix: false

chat:
  # Let ChatPlus own final public chat rendering. Disable EssentialsXChat or any other
  # legacy/string chat formatter for reliable hover/click components.
  enabled: true

  # {message} is inserted as the rich chat component, preserving [item], inventory,
  # ender chest, hover, click, and insertion metadata.
  format: "{prefix}{display_name}{suffix} &8> &f{message}"

  # First matching permission format wins. Useful for staff or donor formats.
  permission-formats:
    chatplus.format.staff: "&#FEE75C[Staff] &f{display_name} &8> &f{message}"

  # Group formats use LuckPerms primary group names, lower-case.
  group-formats:
    owner: "&#ED4245[Owner] &f{display_name} &8> &f{message}"
    admin: "&#FEE75C[Admin] &f{display_name} &8> &f{message}"
    mod: "&#57F287[Mod] &f{display_name} &8> &f{message}"

  luckperms:
    enabled: true
    fallback-prefix: ""
    fallback-suffix: ""
    fallback-primary-group: "default"

  placeholderapi:
    # Allows %placeholderapi_placeholders% in chat formats, group formats, and hover/click text.
    enabled: true

  names:
    use-paper-display-name: true
    fallback-color: "&f"

  message-colors:
    # Allows & color codes in player chat. Item hover metadata remains component-native.
    enabled: false
    legacy-permission: "chatplus.color"
    hex-permission: "chatplus.hex"

  player-hover:
    enabled: true
    lines:
      - "&7Player: &f{username}"
      - "&7Group: &f{primary_group}"
      - "&7World: &f{world}"

  player-click:
    # none, suggest, run, or copy.
    action: "suggest"
    value: "/msg {username} "

item-share:
  # Allows players to type item placeholders such as [item] in public chat.
  # Paper modern chat displays the real item hover tooltip.
  enabled: true

  # Placeholder matching is case-insensitive by default, so [ITEM] also works.
  case-sensitive-placeholders: false

  # Main hand placeholders. The first matching token is replaced by the held item.
  main-hand-placeholders:
    - "[item]"
    - "[i]"
    - "[hand]"

  # Off hand placeholders.
  off-hand-placeholders:
    - "[offhand]"
    - "[off]"

  # Shared safety limits for item, inventory, and ender chest placeholders.
  # Set max-per-message to 0 for no replacement limit.
  max-per-message: 2
  cooldown-seconds: 5

  # Permission gates.
  permission: "chatplus.item"
  off-hand-permission: "chatplus.item.offhand"
  bypass-cooldown-permission: "chatplus.item.bypass-cooldown"

  display:
    # {name} and {plain_item} are clean text names, e.g. "Emerald Block".
    # {item} is the real item display component from Paper.
    # The item hover tooltip is attached to the whole rendered replacement.
    # Also available: {material}, {type}, {placeholder}, {amount}.
    format: "&8[&f{item}{amount}&8]"
    # Used by the legacy chat fallback where hover events are unavailable.
    plain-format: "[{name}{amount}]"
    # Used by DiscordPlus when it relays this ChatPlus message to Discord.
    discord-format: "{name}{amount}"
    amount-format: " &7x{amount}"
    show-amount: true

  hover:
    # item uses the vanilla Minecraft item tooltip. Use text only if another chat
    # plugin strips show_item hover events.
    # Options: text, item
    mode: "item"
    # Lines used when mode is text. Special full-line tokens expand into multiple lines:
    # {durability}, {enchants}, {enchantments}, {lore}
    text:
      - "&#57F287{name}{amount}"
      - "&7Type: &f{material}"
      - "{durability}"
      - "{enchants}"
      - "{lore}"

  click:
    # none, suggest, or copy.
    # suggest puts the item name in the player's chat box when clicked.
    action: "suggest"
    # Shift-click insertion text for supported clients.
    shift-click-insertion: true

  messages:
    no-permission: "&#ED4245You cannot share items in chat."
    cooldown: "&7Wait &#2b98fd{seconds}s &7before sharing another item."
    empty-hand: "&#ED4245Hold an item before using &f[item]&#ED4245."
    too-many-items: "&7You can share up to &#2b98fd{max} &7interactive placeholders per message."
    unavailable: "&#ED4245Could not read your held item. Try again."

inventory-share:
  # Allows players to share a clickable snapshot of their inventory.
  enabled: true
  placeholders:
    - "[inventory]"
    - "[inv]"
  permission: "chatplus.inventory"
  # How long click-to-view snapshots stay available.
  expires-seconds: 120
  display:
    format: "&8[&#2b98fd{player}'s Inventory&8]"
    plain-format: "[{player}'s Inventory]"
    discord-format: "**{player}'s inventory** - {summary}"
    hover-text: "&7Click to view &#2b98fd{player}'s inventory&7."
    title: "&#2b98fd{player}'s Inventory"
  messages:
    empty: "&7That inventory is empty."
    expired: "&#ED4245That shared inventory expired."

ender-chest-share:
  # Allows players to share a clickable snapshot of their ender chest.
  enabled: true
  placeholders:
    - "[enderchest]"
    - "[ender]"
    - "[ec]"
  permission: "chatplus.enderchest"
  expires-seconds: 120
  display:
    format: "&8[&#b642ff{player}'s Ender Chest&8]"
    plain-format: "[{player}'s Ender Chest]"
    discord-format: "**{player}'s ender chest** - {summary}"
    hover-text: "&7Click to view &#b642ff{player}'s ender chest&7."
    title: "&#b642ff{player}'s Ender Chest"
  messages:
    empty: "&7That ender chest is empty."
    expired: "&#ED4245That shared ender chest expired."

modes:
  normal:
    regular-chat: true
    mentions: true
    private-message: true
    teleport-request: true
    server-notice: true
    staff-notice: true
    purchase: true
    warning: true

  quiet:
    regular-chat: false
    mentions: true
    private-message: true
    teleport-request: true
    server-notice: true
    staff-notice: true
    purchase: true
    warning: true

  focus:
    regular-chat: false
    mentions: true
    private-message: true
    teleport-request: true
    server-notice: true
    staff-notice: true
    purchase: true
    warning: true

  off:
    regular-chat: false
    mentions: false
    private-message: true
    teleport-request: true
    server-notice: true
    staff-notice: true
    purchase: true
    warning: true

notifications:
  # Used by /chatadmin notify and ChatPlusApi.send.
  format: "&#2b98fdChatPlus &8› &7{category_label} &8› &f{message}"

  # Used by /chatadmin broadcast and ChatPlusApi.broadcast.
  broadcast-format: "&#2b98fdChatPlus &8› &7{category_label} &8› &f{message}"

messages:
  prefix: "&#2b98fdChatPlus &8› &7"
  mode-changed: "&7Chat mode set to &#2b98fd{mode}&7."
  category-allowed: "&7Allowed &f{category}&7."
  category-blocked: "&7Blocked &f{category}&7."
  category-reset: "&7Reset &f{category}&7."
  settings-reset: "&7Chat preferences reset."
  mentions-on: "&7Mentions are &#57F287enabled&7."
  mentions-off: "&7Mentions are &#ED4245disabled&7."
